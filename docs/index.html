function setLanguage(lang) {
  const t = T[lang];
  if (!t) return;

  document.documentElement.lang = lang;
  document.title = "Clib — " + t.subtitle;

  document.querySelectorAll("[data-i18n]").forEach(function(el) {
    var key = el.getAttribute("data-i18n");
    if (t[key] != null) el.textContent = t[key];
  });

  document.querySelectorAll("[data-i18n-html]").forEach(function(el) {
    var key = el.getAttribute("data-i18n-html");
    if (t[key] != null) el.innerHTML = t[key];
  });

  document.getElementById("langSelect").value = lang;
  try { localStorage.setItem("clib-lang", lang); } catch(e) {}
}

function detectLanguage() {
  try {
    var saved = localStorage.getItem("clib-lang");
    if (saved && T[saved]) return saved;
  } catch(e) {}

  var nav = (navigator.language || navigator.userLanguage || "en").toLowerCase();

  if (nav.startsWith("zh")) {
    if (nav.includes("tw") || nav.includes("hant") || nav.includes("hk") || nav.includes("mo")) return "zh-TW";
    return "zh-CN";
  }

  var base = nav.split("-")[0];
  var supported = ["ko","en","ja","es","pt","fr","de"];
  if (supported.indexOf(base) !== -1) return base;

  return "en";
}

document.getElementById("langSelect").addEventListener("change", function() {
  setLanguage(this.value);
});

setLanguage(detectLanguage());
</script>
