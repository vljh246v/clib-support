  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F8F7F4;
      --surface: #FFFFFF;
      --surf2:   #F2F1EE;
      --primary: #2C2C3A;
      --accent:  #5BA67D;
      --muted:   #8E8E93;
      --body:    #6B6B6B;
      --border:  #E5E5E5;
      --nav-h:   60px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: rgba(248,247,244,0.82);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(229,229,229,0.6);
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--primary);
    }
    .nav-brand img {
      width: 30px; height: 30px; border-radius: 7px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .nav-brand span { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .nav-right { display: flex; align-items: center; gap: 6px; }
    .nav-link {
      font-size: 14px; color: var(--body);
      text-decoration: none; padding: 6px 12px;
      border-radius: 20px; transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: var(--surf2); color: var(--primary); }
    .nav-cta {
      background: var(--primary); color: #fff !important;
      padding: 8px 16px; border-radius: 20px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: opacity 0.15s;
    }
    .nav-cta:hover { opacity: 0.82; }
    .nav-lang {
      appearance: none; -webkit-appearance: none;
      background: var(--surf2); border: none; border-radius: 8px;
      padding: 6px 10px; font-size: 13px; color: var(--primary);
      cursor: pointer; font-family: inherit; margin-left: 4px;
    }

    /* ── HERO ── */
    #hero {
      min-height: 100svh;
      display: flex; align-items: center;
      padding: calc(var(--nav-h) + 60px) 24px 80px;
    }
    .hero-inner {
      max-width: 1100px; margin: 0 auto; width: 100%;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 60px; align-items: center;
    }
    .hero-eyebrow {
      display: inline-block; font-size: 12px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); background: rgba(91,166,125,0.1);
      padding: 4px 12px; border-radius: 20px; margin-bottom: 20px;
    }
    .hero-title {
      font-size: clamp(34px, 4.5vw, 60px);
      font-weight: 800; line-height: 1.15;
      letter-spacing: -1.5px; margin-bottom: 20px;
      white-space: pre-line;
    }
    .hero-tagline {
      font-size: clamp(16px, 1.8vw, 19px);
      color: var(--body); margin-bottom: 36px; line-height: 1.65;
    }
    .hero-actions { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }

    .badge-link { display: inline-block; text-decoration: none; transition: transform 0.15s, opacity 0.15s; }
    .badge-link:hover { transform: translateY(-2px); opacity: 0.88; }
    .badge-link img { height: 52px; width: auto; display: block; }

    .android-note { font-size: 13px; color: var(--muted); }
    .android-note-light { font-size: 13px; color: rgba(255,255,255,0.5); }

    /* Phone mockup */
    .hero-visual { display: flex; justify-content: center; }
    .phone {
      position: relative;
      width: min(270px, 44vw); aspect-ratio: 9/19.5;
      background: var(--surf2); border-radius: 40px;
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.06),
        0 0 0 10px var(--surface),
        0 0 0 12px #C8C8C8,
        0 40px 100px rgba(44,44,58,0.22);
      overflow: hidden;
    }
    .phone img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .phone-ph {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(145deg,#F2F1EE,#E5E3DC);
      color: var(--muted); font-size: 13px; text-align: center; padding: 24px;
    }
    .phone-ph span:first-child { font-size: 36px; }

    /* ── FEATURES GRID ── */
    #features {
      padding: 100px 24px;
      background: var(--surface);
    }
    .sec-head { text-align: center; max-width: 580px; margin: 0 auto 56px; }
    .sec-eye {
      font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 12px;
    }
    .sec-title {
      font-size: clamp(26px, 3.5vw, 42px);
      font-weight: 800; letter-spacing: -1px; line-height: 1.2;
    }
    .grid-6 {
      max-width: 1000px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }
    .feat-card {
      background: var(--bg); border-radius: 20px; padding: 30px 26px;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .feat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(44,44,58,0.08); }
    .feat-icon { font-size: 30px; margin-bottom: 14px; display: block; }
    .feat-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .feat-desc { font-size: 14px; color: var(--body); line-height: 1.65; }

    /* ── FEATURE DETAIL ── */
    .fd {
      padding: 100px 24px;
    }
    .fd:nth-of-type(even) { background: var(--surface); }
    .fd-inner {
      max-width: 960px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: center;
    }
    .fd-inner.rev { direction: rtl; }
    .fd-inner.rev > * { direction: ltr; }
    .fd-eye { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    .fd-title {
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 800; letter-spacing: -0.8px; line-height: 1.25;
      margin-bottom: 14px; white-space: pre-line;
    }
    .fd-desc { font-size: 16px; color: var(--body); line-height: 1.7; }
    .fd-visual { display: flex; justify-content: center; }
    .fd-phone {
      width: min(210px, 38vw); aspect-ratio: 9/19.5;
      background: var(--surf2); border-radius: 32px;
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.06),
        0 0 0 8px var(--surface),
        0 0 0 10px #C8C8C8,
        0 30px 80px rgba(44,44,58,0.18);
      overflow: hidden;
    }
    .fd-phone img { width: 100%; height: 100%; object-fit: cover; }
    .fd-phone .phone-ph { font-size: 12px; }
    .fd-phone .phone-ph span:first-child { font-size: 28px; }

    /* ── DOWNLOAD CTA ── */
    #download {
      padding: 120px 24px; text-align: center;
      background: var(--primary); color: #fff;
    }
    #download .sec-title { color: #fff; margin-bottom: 14px; }
    #download .sec-sub { font-size: 18px; color: rgba(255,255,255,0.68); margin-bottom: 44px; }
    .dl-actions { display: flex; flex-direction: column; align-items: center; gap: 12px; }

    /* ── PRIVACY ── */
    #privacy { padding: 80px 24px; }
    .priv-inner {
      max-width: 720px; margin: 0 auto;
      background: var(--surface); border-radius: 20px; padding: 48px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(44,44,58,0.06);
    }
    .priv-inner h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .priv-date { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .priv-inner h3 { font-size: 15px; font-weight: 600; margin-top: 26px; margin-bottom: 8px; }
    .priv-inner p { font-size: 14px; color: var(--body); line-height: 1.7; margin-bottom: 6px; }
    .priv-inner a { color: var(--accent); text-decoration: none; }
    .priv-inner a:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    footer {
      padding: 36px 24px; background: var(--surface);
      border-top: 1px solid var(--border); text-align: center;
    }
    .foot-inner { max-width: 600px; margin: 0 auto; }
    .foot-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .foot-desc { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
    .foot-link { color: var(--accent); text-decoration: none; font-size: 14px; }
    .foot-link:hover { text-decoration: underline; }
    .foot-copy { margin-top: 20px; font-size: 12px; color: var(--muted); }

    /* ── REVEAL ANIMATIONS ── */
    .rev { opacity: 0; transform: translateY(22px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .rev.on { opacity: 1; transform: none; }
    .d1 { transition-delay: 0.1s; }
    .d2 { transition-delay: 0.2s; }
    .d3 { transition-delay: 0.3s; }
    .d4 { transition-delay: 0.4s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .hero-inner { grid-template-columns: 1fr; gap: 36px; text-align: center; }
      .hero-actions { align-items: center; }
      .hero-visual { order: -1; }
      .phone { width: min(210px, 58vw); }

      .grid-6 { grid-template-columns: 1fr; }

      .fd-inner, .fd-inner.rev { grid-template-columns: 1fr; direction: ltr; gap: 36px; }
      .fd-visual { order: -1; }
      .fd-phone { width: min(190px, 52vw); }

      .priv-inner { padding: 24px 18px; }
      .nav-link { display: none; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .grid-6 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

function setLanguage(lang) {
  const t = T[lang];
  if (!t) return;
  document.documentElement.lang = lang;
  document.title = "Clib \u2014 " + t.subtitle;
  document.querySelectorAll("[data-i18n]").forEach(function(el) {
    var key = el.getAttribute("data-i18n");
    if (t[key] != null) el.textContent = t[key];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(function(el) {
    var key = el.getAttribute("data-i18n-html");
    if (t[key] != null) el.innerHTML = t[key];
  });
  document.getElementById("langSelect").value = lang;
  var heroBadge = document.getElementById("badge-hero");
  var ctaBadge  = document.getElementById("badge-cta");
  if (heroBadge) heroBadge.src = "img/badges/badge_" + lang + "_blk.svg";
  if (ctaBadge)  ctaBadge.src  = "img/badges/badge_" + lang + "_wht.svg";
  try { localStorage.setItem("clib-lang", lang); } catch(e) {}
}

function detectLanguage() {
  try { var s = localStorage.getItem("clib-lang"); if (s && T[s]) return s; } catch(e) {}
  var nav = (navigator.language || "en").toLowerCase();
  if (nav.startsWith("zh")) {
    return (nav.includes("tw")||nav.includes("hant")||nav.includes("hk")||nav.includes("mo")) ? "zh-TW" : "zh-CN";
  }
  var base = nav.split("-")[0];
  return ["ko","en","ja","es","pt","fr","de"].indexOf(base) !== -1 ? base : "en";
}

document.getElementById("langSelect").addEventListener("change", function() { setLanguage(this.value); });

// Reveal on scroll
var revEls = document.querySelectorAll(".rev");
var obs = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add("on"); obs.unobserve(e.target); } });
}, { threshold: 0.12 });
revEls.forEach(function(el) { obs.observe(el); });

setLanguage(detectLanguage());
</script>
